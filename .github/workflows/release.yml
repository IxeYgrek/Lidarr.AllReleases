name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Lidarr source (plugins branch)
        uses: actions/checkout@v4
        with:
          repository: Lidarr/Lidarr
          ref: plugins
          path: Submodules/Lidarr

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compute version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-v1.0.0}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore ./Lidarr.AllReleases.csproj --configfile ./NuGet.config

      - name: Build
        run: dotnet build ./Lidarr.AllReleases.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }} -p:RepositoryUrl=https://github.com/${{ github.repository }}

      - name: Pack plugin zip (net8.0)
        shell: bash
        run: |
          mkdir -p artifacts/package
          cp -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.dll artifacts/package/
          if [ -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.pdb ]; then
            cp -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.pdb artifacts/package/
          fi
          cd artifacts/package
          zip -r ../Lidarr.Plugin.AllReleases.net8.0.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/Lidarr.Plugin.AllReleases.net8.0.zip
          generate_release_notes: true
          body: |
            Minimum Lidarr Version: 3.1.3.4970
