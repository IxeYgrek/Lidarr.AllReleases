name: Build and Release Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Extract Lidarr runtime references from Docker image
        shell: bash
        run: |
          set -euo pipefail
          LIDARR_IMAGE="hotio/lidarr:nightly"
          echo "Using image: $LIDARR_IMAGE"
          docker pull "$LIDARR_IMAGE"
          CID="$(docker create "$LIDARR_IMAGE")"
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

          mkdir -p References
          docker cp "$CID":/app/bin/Lidarr.Common.dll ./References/Lidarr.Common.dll
          docker cp "$CID":/app/bin/Lidarr.Core.dll ./References/Lidarr.Core.dll
          docker cp "$CID":/app/bin/Lidarr.Http.dll ./References/Lidarr.Http.dll

          ls -lah References

      - name: Compute version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-v1.0.0}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore ./Lidarr.AllReleases.csproj --configfile ./NuGet.config -p:NuGetAudit=false

      - name: Build
        run: dotnet build ./Lidarr.AllReleases.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }} -p:RepositoryUrl=https://github.com/${{ github.repository }} -p:NuGetAudit=false -p:RunAnalyzers=false -p:TreatWarningsAsErrors=false -p:WarningsAsErrors=

      - name: Pack plugin zip (net8.0)
        shell: bash
        run: |
          mkdir -p artifacts/package
          cp -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.dll artifacts/package/

          if [ -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.deps.json ]; then
            cp -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.deps.json artifacts/package/
          fi

          if [ -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.runtimeconfig.json ]; then
            cp -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.runtimeconfig.json artifacts/package/
          fi

          if [ -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.pdb ]; then
            cp -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.pdb artifacts/package/
          fi

          cd artifacts/package
          zip -r ../Lidarr.Plugin.AllReleases.net8.0.zip .

      - name: Create/Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: artifacts/Lidarr.Plugin.AllReleases.net8.0.zip
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
                    body: |
            Minimum Lidarr Version: nightly-compatible (built against hotio/lidarr:nightly runtime assemblies)



