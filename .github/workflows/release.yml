name: Build and Release Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout Lidarr source (v3.1.3.4968)
        uses: actions/checkout@v5
        with:
          repository: Lidarr/Lidarr
          ref: v3.1.3.4968
          path: Submodules/Lidarr

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Compute version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-v1.0.0}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore ./Lidarr.AllReleases.csproj --configfile ./NuGet.config -p:NuGetAudit=false

      - name: Build
        run: dotnet build ./Lidarr.AllReleases.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }} -p:RepositoryUrl=https://github.com/${{ github.repository }} -p:NuGetAudit=false -p:RunAnalyzers=false -p:TreatWarningsAsErrors=false -p:WarningsAsErrors=

      - name: Pack plugin zip (net8.0)
        shell: bash
        run: |
          mkdir -p artifacts/package
          cp -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.dll artifacts/package/

          if [ -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.deps.json ]; then
            cp -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.deps.json artifacts/package/
          fi

          if [ -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.runtimeconfig.json ]; then
            cp -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.runtimeconfig.json artifacts/package/
          fi

          if [ -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.pdb ]; then
            cp -f ./bin/Release/net8.0/Lidarr.Plugin.AllReleases.pdb artifacts/package/
          fi

          cd artifacts/package
          zip -r ../Lidarr.Plugin.AllReleases.net8.0.zip .

      - name: Create/Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: artifacts/Lidarr.Plugin.AllReleases.net8.0.zip
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
          body: |
            Minimum Lidarr Version: 3.1.3.4968

